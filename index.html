<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世界读书日 — 4月23日</title>
  <style>
    :root {
      --primary: #003da5;
      --accent: #e8772e;
      --light: #f5f0e8;
      --text: #1a1a2e;
      --muted: #6b7280;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--light);
      overflow-x: hidden;
    }

    /* Lang Switcher */
    .lang-switcher {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 200;
      display: flex;
      gap: 4px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 100px;
      padding: 4px;
      backdrop-filter: blur(12px);
    }

    .lang-btn {
      padding: 6px 18px;
      border: none;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      background: transparent;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 1px;
    }

    .lang-btn.active {
      background: #fff;
      color: var(--primary);
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      background: linear-gradient(135deg, #001f5c 0%, #003da5 55%, #0055b3 100%);
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1920&q=80') center/cover no-repeat;
      opacity: 0.12;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to top, var(--light), transparent);
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-block;
      padding: 5px 20px;
      border: 1.5px solid rgba(255, 255, 255, 0.45);
      border-radius: 100px;
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.8rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .hero h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      color: #fff;
      line-height: 1.0;
      margin-bottom: 1.5rem;
      letter-spacing: -2px;
    }

    .hero h1 em {
      color: var(--accent);
      font-style: normal;
    }

    .hero .date-tag {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 1rem;
      letter-spacing: 1px;
    }

    .hero .tagline {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.55);
      max-width: 480px;
      margin: 0 auto 3.5rem;
      line-height: 1.8;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 36px;
      background: var(--accent);
      color: #fff;
      border-radius: 100px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .hero-cta:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 50px rgba(232, 119, 46, 0.45);
    }

    .scroll-hint {
      position: absolute;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.75rem;
      letter-spacing: 3px;
      z-index: 2;
      animation: bounce 2.5s ease-in-out infinite;
    }

    /* Sections */
    section {
      padding: 7rem 2rem;
      max-width: 820px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 900;
      color: var(--primary);
      line-height: 1.2;
      margin-bottom: 2rem;
    }

    .section-body {
      font-size: 1.08rem;
      line-height: 2;
      color: #4a5568;
    }

    .section-body p + p {
      margin-top: 1.2rem;
    }

    .section-body strong {
      color: var(--primary);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(0,61,165,0.15), transparent);
      max-width: 820px;
      margin: 0 auto;
    }

    /* Origin section */
    .origin-section {
      background: #fff;
    }

    .origin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
      margin-top: 2.5rem;
    }

    .origin-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
    }

    .origin-text {
      font-size: 1rem;
      line-height: 2;
      color: #4a5568;
    }

    .origin-text p + p { margin-top: 1.3rem; }

    /* Quote */
    .quote-section {
      padding: 6rem 2rem;
      max-width: 820px;
      margin: 0 auto;
    }

    .quote-card {
      background: linear-gradient(135deg, var(--primary), #001d50);
      color: #fff;
      border-radius: 20px;
      padding: 4rem 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .quote-card::before {
      content: '\201C';
      position: absolute;
      top: -30px;
      left: 20px;
      font-size: 200px;
      font-family: Georgia, serif;
      color: rgba(255, 255, 255, 0.04);
      line-height: 1;
    }

    .quote-card blockquote {
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-style: italic;
      line-height: 1.7;
      position: relative;
      z-index: 1;
    }

    .quote-card cite {
      display: block;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      font-style: normal;
      opacity: 0.5;
      letter-spacing: 2px;
    }

    /* Significance section */
    .sig-section {
      background: var(--light);
    }

    .sig-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      margin-top: 3rem;
    }

    .sig-item {
      background: #fff;
      border-radius: 16px;
      padding: 2.2rem;
      border: 1px solid rgba(0, 61, 165, 0.07);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .sig-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.08);
    }

    .sig-icon {
      font-size: 2rem;
      margin-bottom: 1.2rem;
    }

    .sig-title {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 0.8rem;
    }

    .sig-text {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.8;
    }

    /* Timeline */
    .timeline-section {
      background: #fff;
    }

    .timeline {
      margin-top: 3rem;
      position: relative;
      padding-left: 2.5rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, var(--primary), var(--accent));
      border-radius: 2px;
    }

    .timeline-item {
      position: relative;
      padding-bottom: 2.5rem;
    }

    .timeline-item:last-child { padding-bottom: 0; }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -2.5rem;
      top: 6px;
      width: 14px;
      height: 14px;
      background: var(--primary);
      border-radius: 50%;
      border: 3px solid #fff;
      transform: translateX(-5px);
    }

    .timeline-year {
      font-size: 0.75rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .timeline-event {
      font-size: 1.05rem;
      color: var(--text);
      line-height: 1.7;
    }

    /* Stats */
    .stats-section {
      background: linear-gradient(135deg, #001f5c, var(--primary));
      color: #fff;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2rem;
      margin-top: 3rem;
    }

    .stat-item {
      text-align: center;
    }

    .stat-num {
      font-size: 2.8rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      opacity: 0.6;
    }

    /* CTA */
    .cta-section {
      text-align: center;
      padding: 8rem 2rem;
      background: var(--light);
    }

    .cta-section h2 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 1rem;
    }

    .cta-section p {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 500px;
      margin: 0 auto 2.5rem;
      line-height: 1.8;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 15px 40px;
      background: var(--primary);
      color: #fff;
      border-radius: 100px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
    }

    .cta-btn:hover {
      background: #002566;
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 61, 165, 0.3);
    }

    /* Footer */
    footer {
      background: #001430;
      color: rgba(255, 255, 255, 0.35);
      text-align: center;
      padding: 2.5rem 2rem;
      font-size: 0.85rem;
      line-height: 1.7;
    }

    footer strong { color: rgba(255,255,255,0.6); }

    /* Animations */
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* Responsive */
    @media (max-width: 680px) {
      .origin-grid { grid-template-columns: 1fr; }
      .sig-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .origin-img { display: none; }
      section { padding: 5rem 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Language Switcher -->
  <div class="lang-switcher">
    <button class="lang-btn active" id="btn-zh">中文</button>
    <button class="lang-btn" id="btn-en">EN</button>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-content">
      <div class="hero-badge">World Book Day</div>
      <h1>世界<br><em>读书日</em></h1>
      <p class="date-tag">April 23 · 4月23日</p>
      <p class="tagline">让世界上每一个角落的每一个人，都能读到书。</p>
      <a href="#origin" class="hero-cta">了解它的故事 ↓</a>
    </div>
    <div class="scroll-hint">SCROLL</div>
  </div>

  <!-- Origin -->
  <section class="origin-section" id="origin">
    <div class="section-label">01 · Origins</div>
    <h2 class="section-title">世界读书日<br>从何而来？</h2>
    <div class="origin-grid">
      <img
        src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=600&q=80"
        alt="图书馆"
        class="origin-img"
        loading="lazy"
      >
      <div class="origin-text" id="origin-text"></div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- Quote -->
  <div class="quote-section">
    <div class="quote-card reveal" id="quote-card"></div>
  </div>

  <!-- Timeline -->
  <section class="timeline-section" id="timeline-section">
    <div class="section-label">02 · History</div>
    <h2 class="section-title">它的历史<br>是怎么走过来的？</h2>
    <div class="timeline reveal" id="timeline"></div>
  </section>

  <div class="divider"></div>

  <!-- Significance -->
  <section class="sig-section" id="sig-section">
    <div class="section-label">03 · Significance</div>
    <h2 class="section-title">它对今天的生活<br>有什么意义？</h2>
    <div class="sig-grid reveal" id="sig-grid"></div>
  </section>

  <div class="divider"></div>

  <!-- Stats -->
  <section class="stats-section">
    <div class="section-label" style="color: rgba(255,255,255,0.45);">04 · Data</div>
    <h2 class="section-title" style="color:#fff;">今天，全球都在读</h2>
    <div class="stats-grid reveal" id="stats-grid"></div>
  </section>

  <!-- CTA -->
  <section class="cta-section">
    <h2>今天，拿起一本书</h2>
    <p id="cta-desc">不需要等到"正确的时间"。读书日存在的意义，是提醒你：每天都值得读书。</p>
    <a href="https://www.douban.com/" target="_blank" rel="noopener" class="cta-btn" id="cta-btn">
      去找一本想读的书 →
    </a>
  </section>

  <!-- Footer -->
  <footer>
    <p>World Book Day · 世界读书日 · UNESCO, 1995</p>
    <p style="margin-top:0.5rem;">今天是第 <strong id="year-num"></strong> 届</p>
  </footer>

  <script>
    // ── Content ─────────────────────────────────────────────────────────
    const CONTENT = {
      zh: {
        origin: `
          <p>世界读书日的构想，最初来自<strong>国际出版商协会</strong>。1995年，该协会在巴塞罗那召开全球大会时提出这个创意，西班牙政府随后将方案提交<strong>联合国教科文组织</strong>。</p>
          <p>但灵感源头，是西班牙加泰罗尼亚地区流传数百年的<strong>圣乔治屠龙传说</strong>。</p>
          <p>传说，勇士圣乔治只身击败恶龙，救出被困公主。公主赠书以谢，书从此成为"胆识与力量"的象征。4月23日因此成为当地圣乔治节——男人送玫瑰，女人赠书。</p>
          <p>UNESCO 选择4月23日还有另一层深意：这一天，是<strong>塞万提斯</strong>（1616）和<strong>莎士比亚</strong>（1564–1616）的辞世纪念日，也是多位文学大师的生日。文学与书，天然属于这一天。</p>
        `,
        quote: {
          text: '我们必须能够让每一个地方每一个人都获得图书。',
          author: '— 联合国教科文组织 · 1995年设立世界读书日'
        },
        timeline: [
          { year: '1972', event: '联合国教科文组织向全世界发出"走向阅读社会"号召，要求图书成为每个人生活的必需品。' },
          { year: '1995', event: '国际出版商协会在巴塞罗那大会上提出设想，西班牙政府提交方案，UNESCO 于11月15日正式宣布4月23日为"世界图书与版权日"。' },
          { year: '1996', event: 'UNESCO 将节日正式更名为"世界读书日"，并在全球推动阅读推广活动。' },
          { year: 'Today', event: '100多个国家与地区每年同步庆祝。世界读书日已成为联合国认定的最具影响力的全球性文化节日之一。' }
        ],
        significance: [
          {
            icon: '📚',
            title: '让阅读成为日常',
            text: '提醒所有人：读书不是任务，是权利。在信息爆炸的时代，深度阅读是保持独立思考最有效的方式。'
          },
          {
            icon: '🌍',
            title: '跨越文化边界',
            text: '书是唯一不需要护照的知识载体。世界读书日推动不同文化间的理解与对话，让差异成为连接而非隔阂。'
          },
          {
            icon: '✍️',
            title: '尊重创作与版权',
            text: '"版权日"提醒我们：每一本书背后都是一个活生生的人。保护版权，就是保护创作者继续写作的权利。'
          },
          {
            icon: '👶',
            title: '培养下一代读者',
            text: '世界读书日特别关注青少年——帮孩子从小养成阅读习惯，是给他们的最好礼物，也是社会最值得的投资。'
          }
        ],
        stats: [
          { num: '100+', label: '参与国家与地区' },
          { num: '31', label: '届中国世界读书日' },
          { num: '1995', label: 'UNESCO 正式设立' },
          { num: '4/23', label: '莎士比亚生死同日' }
        ],
        ctaDesc: '不需要等到"正确的时间"。读书日存在的意义，是提醒你：每天都值得读书。',
        ctaBtn: '去找一本想读的书 →'
      },
      en: {
        origin: `
          <p>The idea for World Book Day originated from the <strong>International Publishers Association</strong>. In 1995, at their global congress in Barcelona, they proposed the concept, and the Spanish government brought it to <strong>UNESCO</strong>.</p>
          <p>But the deeper inspiration comes from a centuries-old legend in <strong>Catalonia, Spain</strong> — the story of Saint George and the dragon.</p>
          <p>The legend says warrior Saint George slew a dragon to rescue a captive princess. In gratitude, the princess gave him a book, declaring: "Books are courage and strength." April 23rd became Saint George's Day — men give roses, women give books.</p>
          <p>UNESCO had another reason to choose April 23rd: it is the death anniversary of both <strong>Miguel de Cervantes</strong> (1616) and <strong>William Shakespeare</strong> (1564–1616), as well as the birthday of several other literary masters. Literature and books belong naturally to this day.</p>
        `,
        quote: {
          text: 'We must make it possible for every person, in every place, to have access to books.',
          author: '— UNESCO · World Book Day established 1995'
        },
        timeline: [
          { year: '1972', event: 'UNESCO calls on the world to "move toward a reading society," making books a daily necessity for every person.' },
          { year: '1995', event: 'The International Publishers Association proposes the idea in Barcelona. Spain submits the proposal to UNESCO, which officially declares April 23rd "World Book and Copyright Day" on November 15th.' },
          { year: '1996', event: 'UNESCO officially renames it "World Book Day" and begins promoting reading activities worldwide.' },
          { year: 'Today', event: 'Over 100 countries and regions celebrate together each year. World Book Day has become one of the most influential globally recognized cultural holidays.' }
        ],
        significance: [
          {
            icon: '📚',
            title: 'Make Reading a Daily Habit',
            text: 'Remind everyone: reading is not a task, it is a right. In the age of information overload, deep reading is the most effective way to maintain independent thinking.'
          },
          {
            icon: '🌍',
            title: 'Bridge Cultural Divides',
            text: 'Books are the only knowledge carriers that need no passport. World Book Day promotes understanding and dialogue between cultures, turning differences into connections.'
          },
          {
            icon: '✍️',
            title: 'Respect Creativity and Copyright',
            text: 'The "Copyright Day" component reminds us: behind every book is a living person. Protecting copyright means protecting creators\' right to keep writing.'
          },
          {
            icon: '👶',
            title: 'Nurture the Next Generation of Readers',
            text: 'World Book Day places special focus on young people — helping children develop reading habits early is the best gift we can give, and society\'s most worthwhile investment.'
          }
        ],
        stats: [
          { num: '100+', label: 'Countries & Regions' },
          { num: '31', label: 'World Book Days Held' },
          { num: '1995', label: 'Established by UNESCO' },
          { num: '4/23', label: "Shakespeare's Birth & Death" }
        ],
        ctaDesc: "You don't need to wait for the \"right time.\" World Book Day's purpose is to remind you: every day is worth reading.",
        ctaBtn: 'Find a book to read →'
      }
    };

    // ── State ──────────────────────────────────────────────────────────
    let lang = localStorage.getItem('wbd-lang') || 'zh';

    function setLang(newLang) {
      lang = newLang;
      localStorage.setItem('wbd-lang', lang);

      document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');

      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.title = lang === 'zh'
        ? '世界读书日 — 4月23日'
        : 'World Book Day — April 23rd';

      render();
    }

    function render() {
      const c = CONTENT[lang];

      // Hero tagline
      document.querySelector('.tagline').textContent =
        lang === 'zh'
          ? '让世界上每一个角落的每一个人，都能读到书。'
          : 'Making books available to every person, in every corner of the world.';

      // Origin text
      document.getElementById('origin-text').innerHTML = c.origin.trim();

      // Quote
      document.getElementById('quote-card').innerHTML =
        `<blockquote>${c.quote.text}</blockquote><cite>${c.quote.author}</cite>`;

      // Timeline
      document.getElementById('timeline').innerHTML = c.timeline.map(item => `
        <div class="timeline-item">
          <div class="timeline-year">${item.year}</div>
          <div class="timeline-event">${item.event}</div>
        </div>`).join('');

      // Significance
      document.getElementById('sig-grid').innerHTML = c.significance.map(item => `
        <div class="sig-item">
          <div class="sig-icon">${item.icon}</div>
          <div class="sig-title">${item.title}</div>
          <div class="sig-text">${item.text}</div>
        </div>`).join('');

      // Stats
      document.getElementById('stats-grid').innerHTML = c.stats.map(item => `
        <div class="stat-item">
          <div class="stat-num">${item.num}</div>
          <div class="stat-label">${item.label}</div>
        </div>`).join('');

      // CTA
      document.getElementById('cta-desc').textContent = c.ctaDesc;
      document.getElementById('cta-btn').textContent = c.ctaBtn;

      // Footer
      document.getElementById('year-num').textContent = new Date().getFullYear() - 1995 + 1;

      // Re-trigger reveal
      setTimeout(() => {
        document.querySelectorAll('.reveal').forEach(el => {
          const r = el.getBoundingClientRect();
          el.classList.toggle('visible', r.top < window.innerHeight);
        });
      }, 50);
    }

    // ── Init ──────────────────────────────────────────────────────────
    document.getElementById('btn-zh').addEventListener('click', () => setLang('zh'));
    document.getElementById('btn-en').addEventListener('click', () => setLang('en'));

    // Scroll reveal
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

    setLang(lang);
  </script>
</body>
</html>
